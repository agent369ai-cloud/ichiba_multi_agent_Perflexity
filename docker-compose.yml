services:
  postgres:
    image: postgres:16-alpine
    container_name: ichiba-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ichiba
      POSTGRES_PASSWORD: ichiba_dev_pw
      POSTGRES_DB: ichiba
    ports:
      - "5432:5432"
    volumes:
      - ichiba-pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  ichiba-pgdata:
